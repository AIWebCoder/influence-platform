# Production server override (scm-101). Save as docker-compose.override.yml
# Then: ./scripts/rebuild-dashboard-prod.sh after each dashboard git pull

services:
  dashboard:
    command:
      - sh
      - -c
      - |
        set -e
        if [ "$${FORCE_DASHBOARD_REBUILD:-0}" = "1" ] || [ ! -f /app/.next/BUILD_ID ]; then
          echo "==> Dashboard production build (FORCE=$${FORCE_DASHBOARD_REBUILD:-0})..."
          npm run build
        fi
        echo "==> Starting next start (BUILD_ID=$$(cat /app/.next/BUILD_ID 2>/dev/null || echo missing))"
        exec npm run start
    environment:
      DASHBOARD_RUN_MODE: start
      FORCE_DASHBOARD_REBUILD: ${FORCE_DASHBOARD_REBUILD:-0}
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - dashboard_next:/app/.next

volumes:
  dashboard_next: