# Production server override (scm-101). Save as docker-compose.override.yml
# Then: ./scripts/rebuild-dashboard-prod.sh after each dashboard git pull

services:
  dashboard:
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f /app/.next/BUILD_ID ]; then
          echo "ERROR: missing /app/.next/BUILD_ID — run ./scripts/rebuild-dashboard-prod.sh"
          exit 1
        fi
        echo "==> Starting next start (BUILD_ID=$$(cat /app/.next/BUILD_ID))"
        exec npm run start
    environment:
      DASHBOARD_RUN_MODE: start
    healthcheck:
      start_period: 120s
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - dashboard_next:/app/.next

volumes:
  dashboard_next: