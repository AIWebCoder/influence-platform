# Production server override (scm-101). Save as docker-compose.override.yml

services:
  dashboard:
    command:
      - sh
      - -c
      - |
        if [ "$${FORCE_DASHBOARD_REBUILD:-0}" = "1" ] || [ ! -f /app/.next/BUILD_ID ]; then
          echo "Production build (FORCE=$${FORCE_DASHBOARD_REBUILD:-0})..."
          npm run build
        fi
        exec npx next start -H 0.0.0.0 -p 3000
    environment:
      DASHBOARD_RUN_MODE: start
      FORCE_DASHBOARD_REBUILD: ${FORCE_DASHBOARD_REBUILD:-0}
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - dashboard_next:/app/.next

volumes:
  dashboard_next: