# ─────────────────────────────────────────
# INFLUENCE PLATFORM — Staging Environment
# Docker Compose for staging deployment
# ─────────────────────────────────────────

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ip_postgres_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-influence_platform_staging}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ip_pgbouncer_staging
    restart: unless-stopped
    ports:
      - "6433:6432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ipuser}:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres:5432/${POSTGRES_DB:-influence_platform_staging}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      LISTEN_PORT: 6432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo 'show version;' | psql -h 127.0.0.1 -p 6432 -U ipuser -d influence_platform_staging -w || true"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ip_redis_staging
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_staging_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # CONTENT FACTORY (Python FastAPI)
  # ─────────────────────────────────────────
  content-factory:
    build:
      context: ./content-factory
      dockerfile: Dockerfile
    container_name: ip_content_factory_staging
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ipuser}:${POSTGRES_PASSWORD:-changeme_secure_password}@pgbouncer:6432/${POSTGRES_DB:-influence_platform_staging}
      REDIS_URL: redis://redis:6379
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      DALLE_API_KEY: ${DALLE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-changeme_very_long_random_string_here}
      ENVIRONMENT: staging
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_secure_password}
      ADMIN_FALLBACK_ENABLED: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,https://staging.yourdomain.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # DISTRIBUTION ENGINE (Node.js)
  # ─────────────────────────────────────────
  distribution-engine:
    build:
      context: ./distribution-engine
      dockerfile: Dockerfile
    container_name: ip_distribution_engine_staging
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ipuser}:${POSTGRES_PASSWORD:-changeme_secure_password}@pgbouncer:6432/${POSTGRES_DB:-influence_platform_staging}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme_very_long_random_string_here}
      PROXY_PROVIDER: ${PROXY_PROVIDER:-brightdata}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      ENVIRONMENT: staging
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # DASHBOARD (Next.js)
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ip_dashboard_staging
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_CONTENT_API_URL: http://content-factory:8000
      NEXT_PUBLIC_DISTRIBUTION_API_URL: http://distribution-engine:3001
      NEXTAUTH_SECRET: ${JWT_SECRET:-changeme_very_long_random_string_here}
      NEXTAUTH_URL: https://staging.yourdomain.com
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      - content-factory
      - distribution-engine

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  default:
    name: influence_platform_staging_network
