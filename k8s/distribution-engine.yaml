apiVersion: apps/v1
kind: Deployment
metadata:
  name: distribution-engine
  labels:
    app: distribution-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distribution-engine
  template:
    metadata:
      labels:
        app: distribution-engine
    spec:
      containers:
        - name: distribution-engine
          image: influence-distribution-engine:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: influence-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: distribution-engine
spec:
  selector:
    app: distribution-engine
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: distribution-engine-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: distribution-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
