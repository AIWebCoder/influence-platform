# ─────────────────────────────────────────
# INFLUENCE PLATFORM — Production Environment
# Docker Compose for production deployment
# ⚠️ Requires secure configuration before use
# ─────────────────────────────────────────

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ip_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-influence_platform_prod}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ip_pgbouncer_prod
    restart: always
    ports:
      - "6434:6432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-influence_platform_prod}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 30
      MIN_POOL_SIZE: 10
      LISTEN_PORT: 6432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo 'show version;' | psql -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-ipuser} -d ${POSTGRES_DB:-influence_platform_prod} -w || true"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: ip_redis_prod
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ─────────────────────────────────────────
  # CONTENT FACTORY (Python FastAPI)
  # ─────────────────────────────────────────
  content-factory:
    build:
      context: ./content-factory
      dockerfile: Dockerfile
    container_name: ip_content_factory_prod
    restart: always
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-influence_platform_prod}
      REDIS_URL: redis://redis:6379
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:?CLAUDE_API_KEY must be set}
      DALLE_API_KEY: ${DALLE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be at least 32 characters}
      JWT_EXPIRE_MINUTES: 60
      ENVIRONMENT: production
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      ADMIN_FALLBACK_ENABLED: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # DISTRIBUTION ENGINE (Node.js)
  # ─────────────────────────────────────────
  distribution-engine:
    build:
      context: ./distribution-engine
      dockerfile: Dockerfile
    container_name: ip_distribution_engine_prod
    restart: always
    ports:
      - "3003:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-influence_platform_prod}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PROXY_PROVIDER: ${PROXY_PROVIDER:-brightdata}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      ENVIRONMENT: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─────────────────────────────────────────
  # DASHBOARD (Next.js)
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ip_dashboard_prod
    restart: always
    ports:
      - "3004:3000"
    environment:
      NEXT_PUBLIC_CONTENT_API_URL: http://content-factory:8000
      NEXT_PUBLIC_DISTRIBUTION_API_URL: http://distribution-engine:3001
      NEXTAUTH_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NEXTAUTH_URL: https://yourproductiondomain.com
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      - content-factory
      - distribution-engine
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  default:
    name: influence_platform_prod_network

# Production notes:
# 1. Set all required environment variables before deployment
# 2. Use strong passwords (minimum 16 characters)
# 3. Configure ALLOWED_ORIGINS with production domain
# 4. Set up TLS/SSL for production domains
# 5. Configure backup strategy for PostgreSQL and Redis
# 6. Set up monitoring and alerting
